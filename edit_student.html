{% extends 'base.html' %}
{% block title %}Edit {{ student.name }} - EduManage{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card">
            <div class="card-header border-0 pt-4 px-4">
                <h5 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Student — {{ student.name }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="form-section-title">Personal Information</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Roll Number <span class="text-danger">*</span></label>
                            <input type="text" name="roll_number" class="form-control" value="{{ student.roll_number }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Gender <span class="text-danger">*</span></label>
                            <select name="gender" class="form-select" required>
                                {% for g in ['Male','Female','Other'] %}
                                <option value="{{ g }}" {% if student.gender == g %}selected{% endif %}>{{ g }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" name="date_of_birth" class="form-control" value="{{ student.date_of_birth or '' }}">
                        </div>
                    </div>

                    <div class="form-section-title">Contact Information</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Email Address <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" value="{{ student.email }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" value="{{ student.phone or '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control" rows="2">{{ student.address or '' }}</textarea>
                        </div>
                    </div>

                    <div class="form-section-title">Academic Information</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Department <span class="text-danger">*</span></label>
                            <select name="department" class="form-select" required>
                                {% for dept in ['Computer Science','Information Technology','Electronics & Communication','Electrical Engineering','Mechanical Engineering','Civil Engineering','Mathematics','Physics','Chemistry','Business Administration'] %}
                                <option value="{{ dept }}" {% if student.department == dept %}selected{% endif %}>{{ dept }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Year <span class="text-danger">*</span></label>
                            <select name="year" class="form-select" required>
                                {% for y in [1,2,3,4] %}
                                <option value="{{ y }}" {% if student.year == y %}selected{% endif %}>{{ y }}{% if y==1 %}st{% elif y==2 %}nd{% elif y==3 %}rd{% else %}th{% endif %} Year</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-end">
                        <a href="{{ url_for('view_student', id=student.id) }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg me-1"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i>Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
